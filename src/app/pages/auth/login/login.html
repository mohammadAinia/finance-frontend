<div class="login-wrapper">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <div class="login-container">
        <p-card styleClass="premium-login-card">

            <div class="text-center mb-5">
                <div class="logo-icon mb-3">
                    <i class="pi pi-shield"></i>
                </div>
                <h2 class="text-2xl font-bold text-white mb-2">تسجيل الدخول</h2>
                <p class="text-gray-400">مرحباً بك في نظام الإدارة المالية</p>
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

                <div *ngIf="errorMessage" class="error-alert mb-4">
                    <i class="pi pi-exclamation-circle"></i>
                    <span>{{ errorMessage }}</span>
                </div>

                <div class="field mb-4 relative-field">
                    <label for="username" class="block font-semibold text-gray-300 mb-2">اسم المستخدم</label>
                    <i class="pi pi-user field-icon"></i>
                    <input id="username" type="text" pInputText formControlName="username" class="w-full premium-input"
                        placeholder="أدخل اسم المستخدم" autocomplete="off" />
                </div>

                <div class="field mb-5 relative-field">
                    <label for="password" class="block font-semibold text-gray-300 mb-2">كلمة المرور</label>
                    <i class="pi pi-lock field-icon"></i>
                    <input id="password" type="password" pInputText formControlName="password"
                        class="w-full premium-input" placeholder="أدخل كلمة المرور" />
                </div>

                <p-button label="دخول آمن" type="submit" icon="pi pi-sign-in"
                    styleClass="w-full premium-btn p-3 text-lg" [disabled]="loginForm.invalid || isLoading"
                    [loading]="isLoading">
                </p-button>
                <div class="text-center mt-4">
                    <p class="text-gray-400 text-sm">
                        ليس لديك حساب؟
                        <a routerLink="/register"
                            class="text-blue-400 hover:text-blue-300 font-bold no-underline transition-colors">أنشئ
                            حساباً جديداً</a>
                    </p>
                </div>
            </form>
        </p-card>
    </div>
</div>
